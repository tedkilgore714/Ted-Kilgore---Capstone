<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test &mdash; AI Job Scout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">
        <img class="logo-icon" src="AI-Job-Scout-Logo.png" alt="AI Job Scout" />
      </a>
      <nav class="site-nav">
        <a href="index.html" data-label="Home">Home</a>
        <a href="how-it-works.html" data-label="How It Works">How It Works</a>
        <a href="coming-soon.html" data-label="Coming Soon">Coming Soon</a>
        <a href="openings.html" data-label="Openings">Openings</a>
        <a href="about.html" data-label="About">About</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">Test: openings table</h1>
      <p class="page-intro">Simple read-only list pulled live from Supabase.</p>

      <div id="test-list"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      &copy; 2026 AI Job Scout
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
    const testClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const listEl = document.getElementById('test-list');

    async function loadRows() {
      const { data, error } = await testClient
        .from('openings')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        listEl.innerHTML = `<p class="simple-list-empty">Error loading data: ${error.message}</p>`;
        console.error(error);
        return;
      }

      if (!data || data.length === 0) {
        listEl.innerHTML = '<p class="simple-list-empty">Table is empty. Add rows to see them here.</p>';
        return;
      }

      const list = document.createElement('div');
      list.className = 'simple-list';

      data.forEach((row) => {
        const item = document.createElement('div');
        item.className = 'simple-list-item';

        const title = document.createElement('div');
        title.className = 'simple-list-title';
        title.textContent = row.title;
        item.appendChild(title);

        const metaParts = [row.company, row.status, row.location].filter(Boolean);
        const meta = document.createElement('div');
        meta.className = 'simple-list-meta';
        meta.textContent = metaParts.join(' · ');
        item.appendChild(meta);

        if (row.url) {
          const link = document.createElement('a');
          link.href = row.url;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.className = 'kanban-card-link';
          link.textContent = 'View posting';
          item.appendChild(link);
        }

        list.appendChild(item);
      });

      listEl.innerHTML = '';
      listEl.appendChild(list);
    }

    loadRows();
  </script>
</body>
</html>
