<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Board &mdash; AI Job Scout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="index.html">
        <img class="logo-icon" src="AI-Job-Scout-Logo.png" alt="AI Job Scout" />
      </a>
      <nav class="site-nav">
        <a href="index.html" data-label="Home">Home</a>
        <a href="how-it-works.html" data-label="How It Works">How It Works</a>
        <a href="companies.html" data-label="Companies">Companies</a>
        <a href="openings.html" data-label="Openings">Openings</a>
        <a href="board.html" aria-current="page" data-label="Board">Board</a>
        <a href="contact.html" data-label="Contact">Contact</a>
        <a href="about.html" data-label="About">About</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container container--wide">
      <p class="page-intro">
        Live Kanban board backed by Supabase &mdash; drag cards between columns,
        click a card to edit or delete it. Changes sync in real time.
      </p>

      <div class="board-toolbar">
        <button id="add-toggle" class="btn" type="button">+ Add Opening</button>
      </div>

      <form id="add-form" class="opening-form" hidden>
        <div class="form-field">
          <label class="form-label" for="add-title">Title *</label>
          <input class="form-input" id="add-title" name="title" type="text" required />
        </div>
        <div class="form-field">
          <label class="form-label" for="add-company">Company *</label>
          <input class="form-input" id="add-company" name="company" type="text" required />
        </div>
        <div class="form-field">
          <label class="form-label" for="add-location">Location</label>
          <input class="form-input" id="add-location" name="location" type="text" />
        </div>
        <div class="form-field">
          <label class="form-label" for="add-posted_at">Posted date</label>
          <input class="form-input" id="add-posted_at" name="posted_at" type="date" />
        </div>
        <div class="form-field">
          <label class="form-label" for="add-match_score">Match score (0&ndash;100)</label>
          <input class="form-input" id="add-match_score" name="match_score" type="number" min="0" max="100" />
        </div>
        <div class="form-field">
          <label class="form-label" for="add-url">URL</label>
          <input class="form-input" id="add-url" name="url" type="url" placeholder="https://..." />
        </div>
        <div class="form-field form-field-wide">
          <label class="form-label" for="add-notes">Notes</label>
          <textarea class="form-input" id="add-notes" name="notes" rows="2"></textarea>
        </div>
        <button class="btn" type="submit">Add</button>
        <p id="add-status" class="form-status"></p>
      </form>

      <div id="board" class="kanban-board board-kanban board-status-colors"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      &copy; 2026 AI Job Scout
    </div>
  </footer>

  <div id="edit-modal" class="modal-overlay" hidden>
    <div class="modal">
      <h2 class="modal-title">Edit opening</h2>
      <form id="edit-form" class="opening-form">
        <input type="hidden" id="edit-id" />
        <div class="form-field">
          <label class="form-label" for="edit-title">Title</label>
          <input class="form-input" id="edit-title" name="title" type="text" required />
        </div>
        <div class="form-field">
          <label class="form-label" for="edit-company">Company</label>
          <input class="form-input" id="edit-company" name="company" type="text" required />
        </div>
        <div class="form-field">
          <label class="form-label" for="edit-status">Status</label>
          <select class="form-input" id="edit-status" name="status">
            <option value="identified">Identified</option>
            <option value="interviewing">Interviewing</option>
            <option value="applied">Applied</option>
            <option value="closed">Closed</option>
          </select>
        </div>
        <div class="form-field">
          <label class="form-label" for="edit-location">Location</label>
          <input class="form-input" id="edit-location" name="location" type="text" />
        </div>
        <div class="form-field">
          <label class="form-label" for="edit-posted_at">Posted date</label>
          <input class="form-input" id="edit-posted_at" name="posted_at" type="date" />
        </div>
        <div class="form-field">
          <label class="form-label" for="edit-match_score">Match score (0&ndash;100)</label>
          <input class="form-input" id="edit-match_score" name="match_score" type="number" min="0" max="100" />
        </div>
        <div class="form-field">
          <label class="form-label" for="edit-salary_range">Salary range</label>
          <input class="form-input" id="edit-salary_range" name="salary_range" type="text" />
        </div>
        <div class="form-field">
          <label class="form-label" for="edit-url">URL</label>
          <input class="form-input" id="edit-url" name="url" type="url" />
        </div>
        <div class="form-field form-field-wide">
          <label class="form-label" for="edit-match_reasons">Match reasons</label>
          <textarea class="form-input" id="edit-match_reasons" name="match_reasons" rows="2"></textarea>
        </div>
        <div class="form-field form-field-wide">
          <label class="form-label" for="edit-notes">Notes</label>
          <textarea class="form-input" id="edit-notes" name="notes" rows="2"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" id="edit-delete" class="btn btn-danger">Delete</button>
          <div class="modal-actions-right">
            <button type="button" id="edit-cancel" class="btn btn-secondary">Cancel</button>
            <button type="submit" class="btn">Save</button>
          </div>
        </div>
        <p id="edit-status-msg" class="form-status"></p>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="board.js"></script>
</body>
</html>
