name: Weekly Scout Digest

on:
  schedule:
    # Mondays at 09:00 UTC (~4am Central during CDT, 3am during CST) --
    # moved off the 7am slot to run before the day's busier API traffic.
    # Adjust the hour if you want the email to land at a different time.
    - cron: "0 9 * * 1"
  workflow_dispatch: {}  # adds a "Run workflow" button for manual test runs

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
        run: python scout_agent.py
